version: "3.8"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: menu-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-menu_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-secret}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - menu-network-dev

  # Go Backend API (Development — Air hot-reload)
  backend:
    build:
      context: ./backend-menu
      dockerfile: Dockerfile.dev
    container_name: menu-backend-dev
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: ${DB_NAME:-menu_db}
      SERVER_PORT: 8080
      APP_ENV: development
    ports:
      - "8080:8080"
    volumes:
      - ./backend-menu:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - menu-network-dev

  # React Frontend (Development — Vite hot-reload)
  frontend:
    build:
      context: ./frontend-menu
      dockerfile: Dockerfile.dev
    container_name: menu-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-menu:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - menu-network-dev

volumes:
  mysql_data_dev:
    driver: local

networks:
  menu-network-dev:
    driver: bridge
